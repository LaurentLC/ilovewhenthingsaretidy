<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I love when things are tidy</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup">
    <p class="eyebrow">Firefox extension</p>
    <h1>I love when things are tidy</h1>
    <p class="intro">Rewrite the visible text of the current page without changing its layout.</p>

    <fieldset class="mode-group">
      <legend>Mode</legend>

      <label class="mode-option">
        <input type="radio" name="mode" value="asc" checked />
        <span>A-Z</span>
      </label>

      <label class="mode-option">
        <input type="radio" name="mode" value="desc" />
        <span>Z-A</span>
      </label>

      <label class="mode-option">
        <input type="radio" name="mode" value="random" />
        <span>Random</span>
      </label>
    </fieldset>

    <div class="actions">
      <button id="applyBtn" type="button">Apply to this tab</button>
      <button id="restoreBtn" type="button" class="secondary">Restore</button>
    </div>

    <p id="status" class="status" aria-live="polite"></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
